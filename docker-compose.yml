services:
  agent:
    build: .
    container_name: weekend-activity-agent
    env_file: .env
    volumes:
      - agent_dynamic_tools:/app/dynamic_tools
      - agent_memories:/app/memories
      - agent_secrets:/app/secrets
    networks:
      - temporal-network
    restart: unless-stopped
    # Default CMD is "worker" — starts Temporal worker + Slack listener

  # One-off: CLI commands
  cli:
    build: .
    env_file: .env
    volumes:
      - agent_dynamic_tools:/app/dynamic_tools
      - agent_memories:/app/memories
      - agent_secrets:/app/secrets
    networks:
      - temporal-network
    entrypoint: ["/app/entrypoint.sh", "cli"]
    profiles: [tools]

networks:
  temporal-network:
    external: true

volumes:
  agent_dynamic_tools:
  agent_memories:
  agent_secrets:
